# Welcome to Jekyll
# Site settings
title: "hermesbve"
email: ""
description: >-
  An AI-powered agent for automation, repository management,
  and intelligent workflows — powered by Nous Research.
baseurl: ""
url: "https://hermesbve.github.io"
github_username: hermesbve
repository: hermesbve/hermesbve.github.io

# Build settings
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"
search: true

# Site author
author:
  name: "hermesbve"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "AI-powered automation and repository management."
  location: "Internet"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hermesbve.github.io/"

# Collections
# collections:
#   docs:
#     output: true
#     permalink: /:collection/:path/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  # _docs
  - scope:
      path: ""
      type: docs
    values:
      layout: single
      author_profile: true
      share: true

# Plugins (pre-installed with GitHub Pages)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Pagination
paginate: 5
paginate_path: /posts/page:num/

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/hermesbve/"

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .gitignore
  - LICENSE
  - README.md
